<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Content Generator</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>

  <div class="container">
    
    <div class="icon">🤖</div>
    
    <div class="title">AI Content Generator</div>

    <div class="input-group">
      <input type="text" id="userInput" placeholder="Ask anything...">
    </div>

    <div class="buttons">
      <button id="askBtn">Ask</button>
      <button id="summaryBtn">Summary</button>
      <button id="ideasBtn">Ideas</button>
      <button id="definitionBtn">Definition</button>
    </div>

    <p id="response" class="response">Ask me anything! 😊</p>

  </div>

  <script src="main.js"></script>
</body>
</html>
